<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>B.Sc. Computer Science AR Poster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #openSiteBtn {
      position: fixed;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      z-index: 9999;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #ffffff;
      padding: 13px 24px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      box-shadow: 0 10px 24px rgba(0, 217, 255, 0.18);
      display: none;
      min-width: 220px;
    }

    #openSiteBtn:active {
      transform: translateX(-50%) scale(0.96);
    }
  </style>
</head>
<body>

  <button id="openSiteBtn">Visit SVIMI</button>

  <a-scene
    mindar-image="imageTargetSrc: ./card.mind; showStats: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <img id="poster" src="./card.png" />
      <a-asset-item id="brainModel" src="./brain.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <!-- ===== TOP CYBER TITLE PANEL ===== -->
      <a-plane
        position="0 0.63 0.05"
        width="1.18"
        height="0.24"
        color="#07162c"
        opacity="0.84">
      </a-plane>

      <a-plane
        position="0 0.63 0.04"
        width="1.24"
        height="0.28"
        color="#00d9ff"
        opacity="0.16"
        animation="property: scale; from: 1 1 1; to: 1.04 1.08 1; dur: 1400; dir: alternate; loop: true; easing: easeInOutSine">
      </a-plane>

      <a-ring
        position="0 0.63 0.03"
        radius-inner="0.47"
        radius-outer="0.59"
        color="#00e5ff"
        opacity="0.16"
        material="side: double; transparent: true"
        animation="property: rotation; to: 0 0 360; dur: 9000; loop: true; easing: linear">
      </a-ring>

      <a-text
        value="B.Sc. Computer Science"
        position="0 0.63 0.08"
        align="center"
        color="#ffffff"
        width="2.35"
        wrap-count="22"
        animation="property: scale; from: 0.98 0.98 0.98; to: 1.04 1.04 1.04; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine">
      </a-text>

      <!-- ===== BRAIN + PREMIUM FX GROUP ===== -->
      <a-entity id="brainGroup" position="0 0.08 0.13">

        <!-- outer neon ring -->
        <a-ring
          position="0 0 0"
          radius-inner="0.26"
          radius-outer="0.31"
          color="#00e5ff"
          opacity="0.32"
          material="side: double; transparent: true"
          animation="property: rotation; to: 0 0 360; dur: 5000; loop: true; easing: linear">
        </a-ring>

        <!-- inner neon ring -->
        <a-ring
          position="0 0 0.01"
          radius-inner="0.16"
          radius-outer="0.20"
          color="#7b61ff"
          opacity="0.28"
          material="side: double; transparent: true"
          animation="property: rotation; to: 0 0 -360; dur: 3500; loop: true; easing: linear">
        </a-ring>

        <!-- floating particles -->
        <a-sphere
          position="-0.30 0.16 0.02"
          radius="0.018"
          color="#00e5ff"
          animation="property: position; from: -0.30 0.10 0.02; to: -0.30 0.22 0.02; dur: 1700; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <a-sphere
          position="0.28 0.12 0.02"
          radius="0.014"
          color="#ffffff"
          animation="property: position; from: 0.28 0.06 0.02; to: 0.28 0.20 0.02; dur: 1400; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <a-sphere
          position="-0.24 -0.14 0.02"
          radius="0.013"
          color="#7b61ff"
          animation="property: position; from: -0.24 -0.18 0.02; to: -0.24 -0.08 0.02; dur: 1600; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <a-sphere
          position="0.25 -0.12 0.02"
          radius="0.016"
          color="#00ffd0"
          animation="property: position; from: 0.25 -0.18 0.02; to: 0.25 -0.05 0.02; dur: 1300; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <a-sphere
          position="0 0.28 0.02"
          radius="0.012"
          color="#ffffff"
          animation="property: position; from: 0 0.22 0.02; to: 0 0.32 0.02; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <!-- 3D brain -->
        <a-gltf-model
          id="brainObject"
          src="#brainModel"
          position="0 0 0.04"
          rotation="0 0 0"
          scale="0.42 0.42 0.42"
          animation__rot="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear"
          animation__float="property: position; from: 0 -0.04 0.04; to: 0 0.08 0.04; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
        </a-gltf-model>

      </a-entity>

      <!-- ===== SUBTITLE PANEL ===== -->
      <a-plane
        position="0 -0.20 0.06"
        width="1.08"
        height="0.12"
        color="#0b1b33"
        opacity="0.78">
      </a-plane>

      <a-text
        value="AI + AR se Seekho Computer Science"
        position="0 -0.20 0.08"
        align="center"
        color="#ffffff"
        width="2.02"
        wrap-count="28">
      </a-text>

    </a-entity>

    <a-light type="ambient" intensity="1" color="#ffffff"></a-light>
  </a-scene>

  <script>
    const btn = document.getElementById("openSiteBtn");
    const target = document.getElementById("target");

    btn.addEventListener("click", function () {
      window.open("https://www.svimi.org/", "_blank");
    });

    target.addEventListener("targetFound", function () {
      btn.style.display = "block";
    });

    target.addEventListener("targetLost", function () {
      btn.style.display = "none";
    });
  </script>
</body>
</html>
