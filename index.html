<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>B.Sc. Computer Science AR Poster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- MindAR + A-Frame adapter -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    /* tap काम करने के लिए सिर्फ छोटा JS नीचे है */
  </style>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: ./card.mind; showStats: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <!-- assets : yahi par sab preload ho raha hai -->
    <a-assets>
      <!-- target poster image -->
      <img id="poster" src="./card.png">

      <!-- aapka 3D model -->
      <a-asset-item id="brainModel" src="./brain.glb"></a-asset-item>

      <!-- font for crisp text -->
      <a-asset-item id="robotoFont" src="https://cdn.aframe.io/fonts/Roboto-msdf.json"></a-asset-item>
    </a-assets>

    <!-- camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- sab AR content yahin bandha hai -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Poster ko thoda translucent dikhana -->
      <a-plane
        src="#poster"
        position="0 0 0"
        height="1.1"
        width="0.75"
        material="opacity: 0.8">
      </a-plane>

      <!-- Upar animated heading (AR shuru wali line change ki) -->
      <a-text
        id="headingText"
        value="B.Sc. Computer Science AR Demo"
        position="0 0.65 0.15"
        align="center"
        color="#00ff88"
        width="2.4"
        font="#robotoFont"
        animation="property: position; from: 0 0.58 0.15; to: 0 0.72 0.15; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine">
      </a-text>

      <!-- Center me 3D brain model rotate hota hua -->
      <a-gltf-model
        id="brainObject"
        src="#brainModel"
        position="0 0.1 0.18"
        rotation="0 0 0"
        scale="0.4 0.4 0.4"
        animation="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear">
      </a-gltf-model>

      <!-- Niche tappable red button -->
      <a-plane
        id="ctaButton"
        color="#ff0066"
        position="0 -0.6 0.18"
        height="0.22"
        width="1.2"
        radius="0.06"
        class="clickable"
        animation="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; dur: 900; dir: alternate; loop: true; easing: easeInOutSine">
      </a-plane>

      <a-text
        value="Tap to see Course Details"
        position="0 -0.6 0.19"
        align="center"
        color="#ffffff"
        width="2.2"
        font="#robotoFont">
      </a-text>

    </a-entity>

    <!-- ambient light -->
    <a-light type="ambient" intensity="1.0" color="#ffffff"></a-light>

  </a-scene>

  <!-- Tap event : button par tap karte hi naya tab khulega -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var sceneEl = document.querySelector("a-scene");

      sceneEl.addEventListener("loaded", function () {
        var button = document.querySelector("#ctaButton");

        button.addEventListener("click", function () {
          // Yahan apna actual course link daalo
          var url = "https://example.com/bsc-computer-science-course-details";
          window.open(url, "_blank");
        });
      });
    });
  </script>

</body>
</html>
