<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>B.Sc. Computer Science AR Poster</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <!-- MindAR + A-Frame adapter -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: ./card.mind; showStats: false;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">

    <a-assets>
      <!-- sirf tracking ke liye poster image (screen par direct nahi dikhate) -->
      <img id="poster" src="./card.png">
      <!-- aapka 3D brain model -->
      <a-asset-item id="brainModel" src="./brain.glb"></a-asset-item>
      <!-- text ke liye font -->
      <a-asset-item id="robotoFont" src="https://cdn.aframe.io/fonts/Roboto-msdf.json"></a-asset-item>
    </a-assets>

    <!-- camera MindAR handle karega -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- AR content: sirf frame + text + 3D + button -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- B.Sc. area ke aas-paas glowing frame (poster ko cover nahi karta, sirf highlight) -->
      <a-plane
        position="0 0.55 0.05"
        height="0.35"
        width="0.9"
        color="#001b3d"
        opacity="0.55">
      </a-plane>

      <a-plane
        position="0 0.55 0.06"
        height="0.38"
        width="0.95"
        color="#00ffe0"
        opacity="0.25"
        animation="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine">
      </a-plane>

      <!-- animated “B.Sc. Computer Science” heading -->
      <a-text
        value="B.Sc. Computer Science"
        position="0 0.62 0.08"
        align="center"
        color="#ffffff"
        width="2.2"
        font="#robotoFont"
        shader="msdf"
        animation="property: position; from: 0 0.58 0.08; to: 0 0.66 0.08; dur: 1500; dir: alternate; loop: true; easing: easeInOutSine">
      </a-text>

      <!-- beech me 3D brain hilta-ghoomta -->
      <a-gltf-model
        id="brainObject"
        src="#brainModel"
        position="0 0.1 0.12"
        rotation="0 0 0"
        scale="0.5 0.5 0.5"
        animation__rot="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear"
        animation__float="property: position; from: 0 0.02 0.12; to: 0 0.18 0.12; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine">
      </a-gltf-model>

      <!-- chhota info text -->
      <a-text
        value="AI + AR se Seekho Computer Science!"
        position="0 -0.1 0.1"
        align="center"
        color="#ffffff"
        width="2"
        font="#robotoFont"
        shader="msdf">
      </a-text>

      <!-- niche slim tappable button -->
      <a-plane
        id="ctaButton"
        color="#ff0066"
        position="0 -0.45 0.1"
        height="0.14"
        width="1.3"
        radius="0.05"
        class="clickable"
        animation="property: scale; from: 1 1 1; to: 1.08 1.08 1.08; dur: 900; dir: alternate; loop: true; easing: easeInOutSine">
      </a-plane>

      <a-text
        value="Tap for Admission Details"
        position="0 -0.45 0.11"
        align="center"
        color="#ffffff"
        width="2"
        font="#robotoFont"
        shader="msdf">
      </a-text>

    </a-entity>

    <a-light type="ambient" intensity="1.0" color="#ffffff"></a-light>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      var sceneEl = document.querySelector("a-scene");
      sceneEl.addEventListener("loaded", function () {
        var button = document.querySelector("#ctaButton");
        button.addEventListener("click", function () {
          var url = "https://www.svimi.org/";
          window.open(url, "_blank");
        });
      });
    });
  </script>
</body>
</html>
